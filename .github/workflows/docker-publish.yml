name: Docker Build and Push

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Lấy code từ GitHub về máy ảo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Đăng nhập vào Docker Hub bằng cái "Két sắt" Secrets đã tạo
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Build Docker Image và đẩy lên Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          # context: . nghĩa là Dockerfile nằm ở thư mục gốc
          # Nếu Dockerfile nằm trong thư mục ai-service, hãy sửa thành ./ai-service
          context: ./ai-service
          push: true
          # Tên Image sẽ có dạng: ten_cua_ban/ai-service:latest
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ai-service:latest
