name: CI

on:
  pull_request:
  push:
    branches: ["**"]

jobs:
  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: ai-service/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile \
            main.py \
            config.py \
            database.py \
            routes/chat.py \
            services/groq.py \
            middleware/auth.py \
            models/schemas.py

